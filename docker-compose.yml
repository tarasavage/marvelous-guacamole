services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
